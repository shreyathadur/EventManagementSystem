# Production Configuration (Render.com)
spring.application.name=university-event-management

# Database — supports both DATABASE_URL (Render) and individual env vars
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:university_ems}}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:defaultSecretKeyForProductionPleaseChangeThis12345}
jwt.expiration=86400000

# Server
server.port=${SERVER_PORT:8080}

# CORS
app.cors.allowed-origins=${FRONTEND_URL:https://ems-frontend.onrender.com}

# Actuator (for health checks)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Logging
logging.level.root=WARN
logging.level.com.eventmgmt=INFO
