# Production Configuration (Render.com)
spring.application.name=university-event-management

# Database — uses Render env vars
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Server
server.port=${SERVER_PORT:8080}

# CORS — allow Render frontend
app.cors.allowed-origins=${FRONTEND_URL:https://ems-frontend.onrender.com}

# Logging
logging.level.root=WARN
logging.level.com.eventmgmt=INFO
