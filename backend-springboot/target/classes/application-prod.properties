# Production Configuration (Render.com)
spring.application.name=university-event-management

# Database — Render provides DATABASE_URL in postgres:// format
# Spring Boot auto-converts DATABASE_URL to JDBC format when using:
spring.datasource.url=${JDBC_DATABASE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/university_ems}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:defaultSecretKeyForProductionPleaseChangeThis12345}
jwt.expiration=86400000

# Server — Render sets PORT env var
server.port=${PORT:${SERVER_PORT:8080}}

# CORS
app.cors.allowed-origins=${FRONTEND_URL:https://ems-frontend.onrender.com}

# Actuator health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging
logging.level.root=WARN
logging.level.com.eventmgmt=INFO
