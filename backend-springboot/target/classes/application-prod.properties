# Production Configuration (Render.com)
spring.application.name=university-event-management

# Database — uses individual env vars set in Render Dashboard
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:university_ems}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:defaultSecretKeyForProductionPleaseChangeThis12345}
jwt.expiration=86400000

# Server — Render injects PORT env var
server.port=${PORT:8080}
server.address=0.0.0.0

# CORS
app.cors.allowed-origins=${FRONTEND_URL:https://ems-frontend.onrender.com}

# Actuator health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging
logging.level.root=WARN
logging.level.com.eventmgmt=INFO
