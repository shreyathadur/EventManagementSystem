# Production Configuration (Render.com)
spring.application.name=university-event-management

# Database — uses individual env vars injected by Render's fromDatabase
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:university_ems}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool — limit to 10 to avoid exhausting Render Postgres free tier
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=600000
# Test query to recover from Render's idle connection reaping
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:defaultSecretKeyForProductionPleaseChangeThis12345}
jwt.expiration=86400000

# Server — Render injects PORT env var
server.port=${PORT:8080}
server.address=0.0.0.0

# CORS — pulls frontend URL from Render service env var
app.cors.allowed-origins=${FRONTEND_URL:https://ems-frontend.onrender.com}

# Actuator health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging — keep minimal to reduce I/O on free tier
logging.level.root=WARN
logging.level.com.eventmgmt=INFO
