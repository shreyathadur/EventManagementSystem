# Render.com Deployment Configuration
# University Event Management System
#
# SETUP: Create PostgreSQL manually in Render Dashboard first:
#   1. Dashboard → New → PostgreSQL → Name: ems-postgres, Region: Oregon, Free
#   2. Copy the Internal Database URL
#   3. Set DATABASE_URL env var in ems-backend service

services:
  # Spring Boot Backend
  - type: web
    name: ems-backend
    region: oregon
    plan: free
    env: docker
    dockerfilePath: ./backend-springboot/Dockerfile
    dockerContext: ./backend-springboot
    healthCheckPath: /actuator/health
    envVars:
      - key: DATABASE_URL
        value: "placeholder-create-postgres-in-dashboard-first"
      - key: JWT_SECRET
        generateValue: true
      - key: SERVER_PORT
        value: "8080"
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  # React Frontend
  - type: web
    name: ems-frontend
    region: oregon
    plan: free
    env: docker
    dockerfilePath: ./frontend-react/Dockerfile
    dockerContext: ./frontend-react
    envVars:
      - key: VITE_API_URL
        fromService:
          name: ems-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL