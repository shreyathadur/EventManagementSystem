# Render.com Deployment Configuration
# University Event Management System
#
# SETUP: Create PostgreSQL manually in Render Dashboard first:
#   1. Dashboard → New → PostgreSQL → Name: ems-postgres, Region: Oregon, Free
#   2. Copy the "Internal Database URL" from the PostgreSQL info page
#   3. Set DATABASE_URL env var in ems-backend service settings

services:
  # Spring Boot Backend (Native Java — no Docker)
  - type: web
    name: ems-backend
    region: oregon
    plan: free
    runtime: java
    buildCommand: cd backend-springboot && chmod +x mvnw && ./mvnw clean package -DskipTests -B
    startCommand: cd backend-springboot && java -Dserver.port=$PORT -Dspring.profiles.active=prod -jar target/event-management-system-1.0.0.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: DATABASE_URL
        value: "set-this-to-your-render-postgres-internal-url"
      - key: JWT_SECRET
        generateValue: true
      - key: SERVER_PORT
        value: "8080"
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  # React Frontend (Native Node.js — no Docker)
  - type: web
    name: ems-frontend
    region: oregon
    plan: free
    runtime: node
    buildCommand: cd frontend-react && npm ci && npm run build
    startCommand: cd frontend-react && npx serve -s dist -l 8080
    envVars:
      - key: VITE_API_URL
        fromService:
          name: ems-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL