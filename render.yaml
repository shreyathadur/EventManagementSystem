# Render.com Deployment Configuration
# University Event Management System

services:
  # Spring Boot Backend
  - type: web
    name: ems-backend
    region: oregon
    plan: free
    runtime: java
    buildCommand: cd backend-springboot && chmod +x mvnw && ./mvnw clean package -DskipTests -B
    startCommand: cd backend-springboot && java -Dserver.port=$PORT -Dspring.profiles.active=prod -jar target/event-management-system-1.0.0.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: ems-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ems-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: ems-postgres
          property: database
      - key: DB_USER
        fromDatabase:
          name: ems-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ems-postgres
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  # React Frontend
  - type: static
    name: ems-frontend
    region: oregon
    buildCommand: cd frontend-react && npm ci && npm run build
    staticPublishPath: frontend-react/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: ems-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: ems-postgres
    databaseName: university_ems
    user: ems_user
    plan: free
    region: oregon