# Render.com Deployment Configuration
# University Event Management System
#
# SETUP: Create PostgreSQL manually in Render Dashboard:
#   1. Dashboard → New → PostgreSQL → Name: ems-postgres, Region: Oregon, Free
#   2. After creation, go to ems-backend → Environment
#   3. Set DB_HOST, DB_PORT, DB_USER, DB_PASSWORD from your PostgreSQL info page

services:
  # Spring Boot Backend
  - type: web
    name: ems-backend
    region: oregon
    plan: free
    runtime: java
    buildCommand: cd backend-springboot && chmod +x mvnw && ./mvnw clean package -DskipTests -B
    startCommand: cd backend-springboot && java -Dserver.port=$PORT -Dspring.profiles.active=prod -jar target/event-management-system-1.0.0.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_HOST
        value: "SET_FROM_RENDER_POSTGRES_INFO"
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: "university_ems"
      - key: DB_USER
        value: "SET_FROM_RENDER_POSTGRES_INFO"
      - key: DB_PASSWORD
        value: "SET_FROM_RENDER_POSTGRES_INFO"
      - key: JWT_SECRET
        generateValue: true
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  # React Frontend
  - type: web
    name: ems-frontend
    region: oregon
    plan: free
    runtime: node
    buildCommand: cd frontend-react && npm ci && npm run build
    startCommand: cd frontend-react && npx serve -s dist -l $PORT
    envVars:
      - key: VITE_API_URL
        fromService:
          name: ems-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL